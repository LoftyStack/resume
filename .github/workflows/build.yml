name: Build Resume

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: sudo apt-get install -y texlive-full

      - name: Build PDF
        run: make build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: output/resume.pdf
